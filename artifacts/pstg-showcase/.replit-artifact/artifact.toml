kind = "web"
previewPath = "/"
title = "Plus Size Thrifted Gems"
version = "1.0.0"
id = "artifacts/pstg-showcase"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19218

[services.development]
run = "pnpm --filter @workspace/pstg-showcase run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pstg-showcase", "run", "build" ]
publicDir = "artifacts/pstg-showcase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19218"
BASE_PATH = "/"
